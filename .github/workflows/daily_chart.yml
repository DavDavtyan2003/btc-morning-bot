name: Daily BTC Chart

on:
  schedule:
    - cron: "0 7 * * *" # 9 AM Spain time (UTC+2 in summer) = 7 AM UTC
  workflow_dispatch: # lets you manually trigger it too, for testing

jobs:
  send-chart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send chart
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python send_chart.py
